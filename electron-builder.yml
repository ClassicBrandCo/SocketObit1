appId: com.socketobit.desktop
productName: SocketObit
directories:
  output: dist/electron
files:
  - src/main/**/*
  - src/preload/**/*
  - dist/renderer/**/*
  - package.json
extraResources:
  - from: src/main/config.json
    to: config.json
  - from: src/main/deviceProfiles.json
    to: deviceProfiles.json
asar: true
asarUnpack:
  - node_modules/electron-store/**/*
  - node_modules/socks-proxy-agent/**/*
  - node_modules/get-port/**/*
win:
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
